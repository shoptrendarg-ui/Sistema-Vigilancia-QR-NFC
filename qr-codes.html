<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <title>QR Codes — Sistema de Vigilancia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --navy:   #0d1b2e;
      --gold:   #c9a84c;
      --gold-l: #e8c96a;
      --white:  #f7f5ef;
      --muted:  #8a8070;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #edeae2;
      color: var(--navy);
      padding: 24px;
    }

    /* ── Screen header ── */
    .screen-header {
      max-width: 960px; margin: 0 auto 28px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .screen-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 700; color: var(--navy);
    }
    .screen-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }
    .btn-print {
      padding: 10px 22px;
      background: linear-gradient(135deg, var(--gold), var(--gold-l));
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      color: var(--navy); cursor: pointer;
      box-shadow: 0 4px 16px rgba(201,168,76,.35);
      transition: all .2s;
    }
    .btn-print:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(201,168,76,.45); }

    /* ── Sections ── */
    .section-label {
      max-width: 960px; margin: 0 auto 14px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px; font-weight: 700;
      color: var(--navy);
      padding-bottom: 8px;
      border-bottom: 2px solid var(--gold);
    }

    /* ── Grid ── */
    .grid {
      max-width: 960px; margin: 0 auto 36px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 18px;
    }

    /* ── Card ── */
    .qr-card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 18px rgba(0,0,0,.10), 0 1px 3px rgba(0,0,0,.07);
      display: flex; flex-direction: column;
      break-inside: avoid;
    }

    .qr-card-top {
      background: var(--navy);
      padding: 10px 12px 8px;
      display: flex; align-items: center; gap: 8px;
    }
    .qr-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold); flex-shrink: 0;
    }
    .qr-institution {
      font-size: 9px; color: rgba(255,255,255,.55);
      text-transform: uppercase; letter-spacing: .5px; line-height: 1.3;
    }

    .qr-body {
      padding: 14px 14px 10px;
      display: flex; flex-direction: column; align-items: center;
      flex: 1;
    }

    .qr-canvas-wrap {
      width: 148px; height: 148px;
      padding: 6px;
      background: #fff;
      border: 2px solid #f0ede6;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 12px;
    }
    .qr-canvas-wrap canvas,
    .qr-canvas-wrap img { width: 136px !important; height: 136px !important; }

    .qr-id {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px; font-weight: 700;
      color: var(--navy); letter-spacing: 1px;
      margin-bottom: 3px;
    }

    .qr-edificio {
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .8px;
      color: var(--gold);
      margin-bottom: 2px;
    }

    .qr-url {
      font-size: 8px; color: var(--muted);
      word-break: break-all; text-align: center;
      line-height: 1.4; margin-top: 4px;
    }

    .qr-card-bottom {
      background: linear-gradient(135deg, var(--gold), var(--gold-l));
      height: 4px;
    }

    /* ── Print styles ── */
    @media print {
      body { background: #fff; padding: 10px; }
      .screen-header, .btn-print { display: none !important; }
      .section-label { max-width: 100%; font-size: 16px; margin-bottom: 10px; }
      .grid { max-width: 100%; gap: 12px; grid-template-columns: repeat(4, 1fr); margin-bottom: 24px; }
      .qr-card { box-shadow: none; border: 1px solid #ddd; }
      .qr-canvas-wrap { width: 130px; height: 130px; }
      .qr-canvas-wrap canvas,
      .qr-canvas-wrap img { width: 118px !important; height: 118px !important; }
      .qr-id { font-size: 22px; }
    }
  </style>
</head>
<body>

<div class="screen-header">
  <div>
    <div class="screen-title">Códigos QR — Sistema de Vigilancia</div>
    <div class="screen-sub">Subsecretaría de Infraestructura Informática y Servicios Comunes · 23 puntos</div>
  </div>
  <button class="btn-print" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
</div>

<div class="section-label">Campus</div>
<div class="grid" id="gridCampus"></div>

<div class="section-label">Agronomía</div>
<div class="grid" id="gridAgro"></div>

<script>
  const BASE_URL = 'https://sistemavigilanciainfraestructura.netlify.app/?p=';

  const CAMPUS = ['C001','C002','C003','C004','C005','C006','C007','C008',
                  'C009','C010','C011','C012','C013','C014','C015','C016','C017'];
  const AGRO   = ['A001','A002','A003','A004','A005','A006'];

  function edificio(id) {
    return id.startsWith('C') ? 'Campus' : 'Agronomía';
  }

  function buildCard(puntoId, container) {
    const url = BASE_URL + puntoId;

    const card = document.createElement('div');
    card.className = 'qr-card';
    card.innerHTML = `
      <div class="qr-card-top">
        <div class="qr-dot"></div>
        <div class="qr-institution">Subsec. Infraestructura<br>Informática y Servicios</div>
      </div>
      <div class="qr-body">
        <div class="qr-canvas-wrap" id="qr-${puntoId}"></div>
        <div class="qr-id">${puntoId}</div>
        <div class="qr-edificio">${edificio(puntoId)}</div>

      </div>
      <div class="qr-card-bottom"></div>
    `;
    container.appendChild(card);

    new QRCode(document.getElementById('qr-' + puntoId), {
      text: url,
      width: 136,
      height: 136,
      colorDark: '#0d1b2e',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  }

  const gridC = document.getElementById('gridCampus');
  const gridA = document.getElementById('gridAgro');

  CAMPUS.forEach(id => buildCard(id, gridC));
  AGRO.forEach(id   => buildCard(id, gridA));
</script>
</body>
</html>
